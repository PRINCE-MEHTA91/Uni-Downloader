<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="gradient-header">
        <h1>Universal Video Downloader</h1>
    </header>

    <main class="container">
        <div class="theme-switcher">
            <button id="theme-toggle">🌙</button>
        </div>

        <div class="input-section">
            <input type="text" id="video-url" placeholder="Paste video URL here...">
            <button id="fetch-btn" class="rounded-btn">Get Video Info</button>
        </div>

        <div id="loader" class="loader" style="display: none;"></div>
        <div id="error-message" class="error" style="display: none;"></div>
        
        <div id="video-info" style="display: none;">
            <div class="video-preview">
                <img id="thumbnail" src="" alt="Video Thumbnail">
                <div class="video-details">
                    <h2 id="video-title"></h2>
                    <p id="video-duration"></p>
                </div>
            </div>
            <h3>Available Formats:</h3>
            <div id="formats-container" class="formats-grid"></div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer>
        <p>Created by Prince mehta</p>
    </footer>
</body>
</html>
